<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Norris</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
</head>
<body>
    <main class="home-screen" id="home-screen">
        <div class="home-panel">
            <h1 class="home-title">Duck Norris</h1>
            <button id="play-button" class="play-button" type="button" aria-label="Jouer">
                <img id="play-button-image" src="assets/button/Play-Idle.png" alt="Jouer">
            </button>
        </div>
    </main>

    <section id="game-wrapper" class="game-wrapper" aria-hidden="true">
        <div id="game-container" class="game-container"></div>
    </section>

    <script src="src/collisions.js"></script>
    <script src="src/map.js"></script>
    <script src="src/player.js"></script>
    <script src="src/enemy.js"></script>
    <script src="src/sketch.js"></script>

</body>
</html>
